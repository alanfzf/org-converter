<!DOCTYPE HTML>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Org to PDF Converter</title>
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
  </head>
  <body class="m-0 min-h-screen grid place-items-center bg-slate-100 font-sans">
    <main class="w-[min(90vw,420px)] rounded-xl border border-slate-200 bg-white p-6 shadow-sm">
      <h1 class="mt-0 mb-4 text-xl font-semibold text-slate-900">Upload an Org file</h1>
      <form action="/convert" method="post" enctype="multipart/form-data" class="grid gap-3">
        <input
          class="block w-full rounded-lg border border-slate-300 bg-white p-2 text-sm text-slate-700 file:mr-3 file:rounded-md file:border-0 file:bg-slate-100 file:px-3 file:py-2 file:text-sm file:font-medium file:text-slate-700"
          type="file"
          name="file"
          accept=".org"
          required
        />
        <button
          class="cursor-pointer rounded-lg bg-blue-600 px-4 py-2.5 text-white transition hover:bg-blue-700"
          type="submit"
        >
          Convert and download PDF
        </button>
      </form>
    </main>
  </body>
</html>
